<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <link rel="stylesheet" href="index.css">
    <title>FileWizard</title>
  </head>
  <body>
    <div class="sidebar">
        <a class="active" href="#convertPhotos">Convert Photos</a>
        <a href="#convertVideos">Convert Videos</a>
        <a href="#compressPhotos">Compress Photos</a>
        <a href="#compressVideos">Compress Videos</a>
    </div>

    <div class="content">
        <div id="convertPhotos" class="section">
            <h>This page converts photos</h>
            <div class="horizontalAlign">
              <div class="verticalButtons">
                <button>jpg</button>
                <button>jpeg</button>
                <button>png</button>
                <button>heic</button>
                <button>heif</button>
                <button>avif</button>
                <button>tiff</button>
                <button>bmp</button>
              </div>
              <p> Converting To: </p>
              <div class="verticalButtons">
                <button>jpg</button>
                <button>jpeg</button>
                <button>png</button>
                <button>heic</button>
                <button>heif</button>
                <button>avif</button>
                <button>tiff</button>
                <button>bmp</button>
              </div>
            </div>
        </div>
        <div id="convertVideos" class="section">
            <h>This page converts videos</h>
            <div class="horizontalAlign">
              <div class="verticalButtons">
                <button>mp4</button>
                <button>mov</button>
                <button>webm</button>
                <button>mkv</button>
                <button>avi</button>
                <button>wmv</button>
                <button>mp4</button>
              </div>
              <div class="verticalButtons">
                <button>mp4</button>
                <button>mov</button>
                <button>webm</button>
                <button>mkv</button>
                <button>avi</button>
                <button>wmv</button>
                <button>mp4</button>
              </div>
            </div>
        </div>
        <div id="compressPhotos" class="section">
            <h>This page compresses photos</h>
            <div class="verticalButtons">
              <button>jpg</button>
              <button>jpeg</button>
              <button>png</button>
              <button>heic</button>
              <button>heif</button>
              <button>avif</button>
              <button>tiff</button>
              <button>bmp</button>
            </div>
        </div>
        <div id="compressVideos" class="section">
            <h>This page compresses videos</h>
            <div class="verticalButtons">
              <button>mp4</button>
              <button>mov</button>
              <button>webm</button>
              <button>mkv</button>
              <button>avi</button>
              <button>wmv</button>
              <button>mp4</button>
            </div>
        </div>
    </div>

    <script src="contentRenderer.js"></script>
  </body>
</html>
